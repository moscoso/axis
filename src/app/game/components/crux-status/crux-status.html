<h4>Cruxes</h4>
<ul>
    @for (row of rows(); track row.element) {
        <li [attr.data-element]="row.element" [attr.data-control]="row.control">
            <span class="el">{{ row.element }}</span>
            <span class="ctl">{{ row.control }}</span>
        </li>
    } @empty {
        <li class="empty">No zones yet</li>
    }
</ul>
