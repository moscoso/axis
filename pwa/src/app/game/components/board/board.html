@if (rows().length === 0) {
    <div class="empty">Awaiting setup…</div>
} @else {
    <div class="board">
        <div class="grid">
            @for (row of rows(); track $index) {
                @for (cell of row; track cell.position.col) {
                    <app-board-cell
                        [cell]="cell"
                        [selectable]="selectable() && cell.stone === null && !cell.hasCrux"
                        [selected]="isPending(cell.position)"
                        [eligible]="eligible(cell.position)"
                        [inCross]="inCross(cell.position)"
                        [dim]="!!armedColor() && selectable() && cell.stone === null && !cell.hasCrux && !eligible(cell.position)"
                        [ghostGlyph]="ghostGlyphFor(cell.position)"
                        [ghostOwner]="pendingOwner()"
                        [class.drag-over]="isDragOver(cell.position)"
                        (click)="onChoose(cell.position)"
                        (dragover)="onDragOver(cell.position, $event)"
                        (dragleave)="onDragLeave(cell.position)"
                        (drop)="onDrop(cell.position, $event)">
                    </app-board-cell>
                }
            }
        </div>
    </div>
}
