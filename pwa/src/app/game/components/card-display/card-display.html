<div class="row">
    @for (c of cards(); track c.id) {
        <app-card
            [card]="c"
            [size]="cardSize()"
            [selectable]="selectable()"
            (click)="onPick(c)">
        </app-card>
    } @empty {
        <div class="placeholder">Display empty</div>
    }

    <div class="deck-col">
        <app-deck-card
            class="deck"
            [count]="deckSize()"
            [size]="cardSize()"
            [selectable]="selectable()"
            (draw)="drawFromDeck.emit()">
        </app-deck-card>
        <span class="discard-chip" [class.empty]="!hasDiscard()" title="Discard pile">
            Discard <b>{{ discardSize() }}</b>
        </span>
    </div>
</div>
