<header class="title">Score</header>

<section class="totals" [attr.data-leader]="totalLeader()">
    <div class="side" data-side="light">
        <span class="label">Light</span>
        <span class="value">{{ lightTotal() }}</span>
    </div>
    <span class="diff" [attr.data-sign]="totalLeader()">
        {{ formatDiff(totalDiff()) }}
    </span>
    <div class="side" data-side="dark">
        <span class="label">Dark</span>
        <span class="value">{{ darkTotal() }}</span>
    </div>
</section>

<section class="cruxes" aria-label="Stones on each Crux's cross">
    @for (c of cruxes(); track c.color) {
        <div class="crux-row" [attr.data-color]="c.color" [attr.data-leader]="c.leader">
            <span class="el" [attr.aria-label]="c.color + ' crux'">{{ c.symbol }}</span>
            <span class="num light">{{ c.light }}</span>
            <span class="diff">{{ formatDiff(c.diff) }}</span>
            <span class="num dark">{{ c.dark }}</span>
        </div>
    }
</section>
