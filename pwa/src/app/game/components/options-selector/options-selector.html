<span class="label">House Rules</span>
<div class="options">
    <button type="button"
            class="toggle"
            [class.active]="shiftGlyphs()"
            [disabled]="disabled()"
            [attr.aria-pressed]="shiftGlyphs()"
            (click)="toggleShiftGlyphs()">
        Shift Glyphs
        <span class="state">{{ shiftGlyphs() ? 'On' : 'Off' }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="affinityActive()"
            [disabled]="disabled()"
            [attr.aria-pressed]="affinityActive()"
            (click)="cycleAffinity()">
        Affinity
        <span class="state">{{ affinityLabel() }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="bond()"
            [disabled]="disabled()"
            [attr.aria-pressed]="bond()"
            (click)="toggleBond()">
        Bond
        <span class="state">{{ bond() ? 'On' : 'Off' }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="force()"
            [disabled]="disabled()"
            [attr.aria-pressed]="force()"
            (click)="toggleForce()">
        Crux Force
        <span class="state">{{ force() ? 'On' : 'Off' }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="spells()"
            [disabled]="disabled()"
            [attr.aria-pressed]="spells()"
            (click)="toggleSpells()">
        Spells
        <span class="state">{{ spells() ? 'On' : 'Off' }}</span>
    </button>
    <div class="stepper" [class.active]="baseRuneCharge() > 0">
        Base Charge
        <div class="stepper-controls">
            <button type="button" aria-label="Decrease base charge" [disabled]="!canDecCharge()" (click)="stepBaseCharge(-1)">−</button>
            <span class="state">{{ baseRuneCharge() }}</span>
            <button type="button" aria-label="Increase base charge" [disabled]="!canIncCharge()" (click)="stepBaseCharge(1)">+</button>
        </div>
    </div>
</div>
