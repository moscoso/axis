<span class="label">House Rules</span>
<div class="options">
    <button type="button"
            class="toggle"
            [class.active]="shiftGlyphs()"
            [disabled]="disabled()"
            [attr.aria-pressed]="shiftGlyphs()"
            (click)="toggleShiftGlyphs()">
        Shift Glyphs
        <span class="state">{{ shiftGlyphs() ? 'On' : 'Off' }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="affinity()"
            [disabled]="disabled()"
            [attr.aria-pressed]="affinity()"
            (click)="toggleAffinity()">
        Affinity
        <span class="state">{{ affinity() ? 'On' : 'Off' }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="bond()"
            [disabled]="disabled()"
            [attr.aria-pressed]="bond()"
            (click)="toggleBond()">
        Bond
        <span class="state">{{ bond() ? 'On' : 'Off' }}</span>
    </button>
    <button type="button"
            class="toggle"
            [class.active]="force()"
            [disabled]="disabled()"
            [attr.aria-pressed]="force()"
            (click)="toggleForce()">
        Crux Force
        <span class="state">{{ force() ? 'On' : 'Off' }}</span>
    </button>
</div>
