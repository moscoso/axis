<app-drawer title="Event Log" side="left" (close)="onClose()">
    <ul>
        @for (e of entries(); track e.id) {
            <li>
                <span class="time">{{ formatTime(e.at) }}</span>
                <span class="type">{{ e.type }}</span>
            </li>
        } @empty {
            <li class="empty">No events yet.</li>
        }
    </ul>
</app-drawer>
