<header class="top">
    <h1>AXIS</h1>
    @if (!inLobby()) {
        <app-turn-indicator [currentTurn]="currentTurn()" [phase]="phase()"></app-turn-indicator>
    }
    <div class="top-actions">
        @if (isGameOver()) {
            <button mat-flat-button color="accent" type="button" (click)="onPlayAgain()">
                Play Again
            </button>
            <button mat-stroked-button type="button" (click)="onNewGame()">
                New Game
            </button>
        }
        <button type="button" class="icon-btn log-btn" aria-label="Event log" title="Event log" (click)="openEventLog()">📜</button>
        <button type="button" class="icon-btn settings-btn" aria-label="Settings" title="Settings" (click)="openSettings()">⚙</button>
        <app-user-badge></app-user-badge>
        <app-connection-status></app-connection-status>
    </div>
</header>

@if (inLobby()) {
    @if (table(); as t) {
        <app-lobby [table]="t"></app-lobby>
    } @else {
        <div class="loading">Connecting…</div>
    }
} @else if (game(); as g) {
    <div class="content">
        <aside class="rift-rail">
            <app-player-panel
                [side]="opponentSide()"
                [seat]="topSeat()"
                [score]="opponentSide() === 'light' ? lightScore() : darkScore()"
                [isActive]="currentTurn() === opponentSide() && inMainTurn()">
            </app-player-panel>
            <app-rift-track [value]="rift()" [perspective]="mySide()"></app-rift-track>
            <app-player-panel
                [side]="mySide()"
                [seat]="bottomSeat()"
                [score]="mySide() === 'light' ? lightScore() : darkScore()"
                [isActive]="isMyTurn() && inMainTurn()">
            </app-player-panel>
        </aside>

        <main class="arena">
            <section class="board-stage">
                <app-board
                    [game]="g"
                    [armedColor]="armedColor() ?? null"
                    [selectable]="canInscribe()"
                    (cellClicked)="onCellClick($event)">
                </app-board>
            </section>

            <section class="dice-tray">
                <app-dice-pool
                    [dice]="dice()"
                    [armedColor]="armedColor() ?? null"
                    [pickable]="canInscribe()"
                    (diePicked)="onDieSelected($event)">
                </app-dice-pool>
            </section>
        </main>
    </div>
} @else {
    <div class="loading">Loading game…</div>
}

@if (settingsOpen()) {
    <app-settings (close)="closeSettings()"></app-settings>
}

@if (eventLogOpen()) {
    <app-event-log (close)="closeEventLog()"></app-event-log>
}

@if (showVictory()) {
    @if (winReason(); as reason) {
        <app-victory-modal
            [winner]="winner()"
            [reason]="reason"
            [lightScore]="lightScore()"
            [darkScore]="darkScore()"
            (close)="onDismissVictory()"
            (playAgain)="onPlayAgain()"
            (newGame)="onNewGame()">
        </app-victory-modal>
    }
}
